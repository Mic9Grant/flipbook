<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pageturner — Document Flipbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
<style>
  :root{
    --desk:#243329;
    --desk-deep:#1a2620;
    --paper:#fbf7ee;
    --paper-shade:#efe7d6;
    --paper-edge:#ddd2ba;
    --ink:#282318;
    --ink-soft:#5c5545;
    --brass:#c09543;
    --brass-bright:#e3bc6d;
    --sage:#93a89a;
    --page-w:430px;
    --page-h:560px;
    --flip-ms:750ms;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'IBM Plex Sans',system-ui,sans-serif;
    background:
      radial-gradient(1200px 700px at 50% 30%, rgba(255,255,255,.06), transparent 60%),
      radial-gradient(900px 600px at 85% 90%, rgba(0,0,0,.35), transparent 60%),
      var(--desk);
    color:var(--paper);
    display:flex;flex-direction:column;overflow:hidden;
  }
  body::after{ /* felt grain */
    content:"";position:fixed;inset:0;pointer-events:none;opacity:.5;
    background-image:radial-gradient(rgba(255,255,255,.025) 1px, transparent 1px);
    background-size:3px 3px;
  }

  /* ---------- header ---------- */
  header{
    display:flex;align-items:center;gap:18px;
    padding:14px 26px;flex-wrap:wrap;z-index:5;
    border-bottom:1px solid rgba(227,188,109,.18);
    background:linear-gradient(180deg, rgba(0,0,0,.25), rgba(0,0,0,0));
  }
  .brand{display:flex;align-items:baseline;gap:10px;margin-right:auto}
  .brand h1{
    font-family:'Fraunces',serif;font-weight:700;font-size:1.45rem;
    letter-spacing:.01em;color:var(--paper);
  }
  .brand h1 em{font-style:italic;color:var(--brass-bright)}
  .brand .doc-name{
    font-size:.8rem;color:var(--sage);max-width:34ch;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }

  .seg{
    display:flex;border:1px solid rgba(227,188,109,.45);border-radius:999px;
    overflow:hidden;background:rgba(0,0,0,.25);
  }
  .seg button{
    appearance:none;border:0;background:transparent;color:var(--sage);
    font:inherit;font-size:.82rem;font-weight:500;padding:8px 16px;cursor:pointer;
    display:flex;align-items:center;gap:8px;transition:background .2s,color .2s;
  }
  .seg button svg{width:15px;height:15px;transition:transform .45s cubic-bezier(.34,1.4,.5,1)}
  .seg button.active{background:var(--brass);color:#241c0c}
  .seg button:not(.active):hover{color:var(--paper)}
  .seg button.active svg{transform:rotate(0deg)}

  .btn{
    appearance:none;border:1px solid rgba(227,188,109,.45);border-radius:999px;
    background:rgba(0,0,0,.25);color:var(--paper);font:inherit;font-size:.82rem;
    font-weight:500;padding:8px 18px;cursor:pointer;transition:background .2s,border-color .2s;
  }
  .btn:hover{background:rgba(192,149,67,.25);border-color:var(--brass-bright)}
  .btn.primary{background:var(--brass);border-color:var(--brass);color:#241c0c}
  .btn.primary:hover{background:var(--brass-bright)}
  .btn:focus-visible,.seg button:focus-visible{outline:2px solid var(--brass-bright);outline-offset:2px}

  /* ---------- stage ---------- */
  main{flex:1;position:relative;display:flex;align-items:center;justify-content:center;min-height:0}
  #scaler{transform-origin:center center;transition:transform .35s ease}
  #stage{
    position:relative;perspective:2600px;
    width:calc(var(--page-w)*2);height:var(--page-h);
    filter:drop-shadow(0 30px 40px rgba(0,0,0,.45));
    transition:width .3s ease,height .3s ease;
  }
  #stage.vertical{width:var(--page-w);height:calc(var(--page-h)*2)}

  /* base of the closed side of the book */
  .base{
    position:absolute;background:var(--paper-shade);border-radius:4px;
    box-shadow:inset 0 0 0 1px var(--paper-edge);display:none;
  }
  #stage.has-left .base.left{display:block;left:0;top:0;width:var(--page-w);height:var(--page-h)}
  #stage.vertical.has-left .base.left{width:var(--page-w);height:var(--page-h);left:0;top:0}
  #stage.has-right .base.right{display:block;right:0;bottom:0;width:var(--page-w);height:var(--page-h)}

  .sheet{
    position:absolute;width:var(--page-w);height:var(--page-h);
    transform-style:preserve-3d;
    transition:transform var(--flip-ms) cubic-bezier(.35,.1,.22,1);
    left:var(--page-w);top:0;transform-origin:left center;
  }
  #stage.vertical .sheet{left:0;top:var(--page-h);transform-origin:center top}
  .sheet.flipped{transform:rotateY(-180deg)}
  #stage.vertical .sheet.flipped{transform:rotateX(180deg)}
  .sheet.no-anim{transition:none}

  .face{
    position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    background:var(--paper);border-radius:0 4px 4px 0;overflow:hidden;
    box-shadow:inset 0 0 0 1px var(--paper-edge);
  }
  .face.back{transform:rotateY(180deg);border-radius:4px 0 0 4px}
  #stage.vertical .face{border-radius:0 0 4px 4px}
  #stage.vertical .face.back{transform:rotateX(180deg);border-radius:4px 4px 0 0}

  /* spine shading — deepens while a sheet is mid-flip */
  .face::after{
    content:"";position:absolute;inset:0;pointer-events:none;transition:opacity var(--flip-ms);
    background:linear-gradient(90deg, rgba(60,45,20,.20), rgba(60,45,20,0) 12%);
    opacity:.7;
  }
  .face.back::after{background:linear-gradient(-90deg, rgba(60,45,20,.20), rgba(60,45,20,0) 12%)}
  #stage.vertical .face::after{background:linear-gradient(180deg, rgba(60,45,20,.20), rgba(60,45,20,0) 12%)}
  #stage.vertical .face.back::after{background:linear-gradient(0deg, rgba(60,45,20,.20), rgba(60,45,20,0) 12%)}

  /* ---------- page content ---------- */
  .page{width:100%;height:100%;position:relative;color:var(--ink);background:var(--paper)}
  .page .page-body{
    position:absolute;inset:0;padding:38px 40px 46px;overflow:hidden;
    font-size:14.5px;line-height:1.62;
  }
  .page .page-num{
    position:absolute;bottom:14px;width:100%;text-align:center;
    font-family:'Fraunces',serif;font-size:11.5px;color:var(--ink-soft);letter-spacing:.12em;
  }
  .page-body h1,.page-body h2,.page-body h3{
    font-family:'Fraunces',serif;color:var(--ink);line-height:1.25;margin:0 0 .55em;
  }
  .page-body h1{font-size:1.7rem;font-weight:700}
  .page-body h2{font-size:1.25rem;font-weight:600;margin-top:.9em}
  .page-body h3{font-size:1.05rem;font-weight:600;margin-top:.8em}
  .page-body p{margin:0 0 .8em}
  .page-body ul,.page-body ol{margin:0 0 .9em 1.2em}
  .page-body li{margin-bottom:.3em}
  .page-body img{max-width:100%;height:auto}
  .page-body table{border-collapse:collapse;font-size:.86em;margin-bottom:1em}
  .page-body td,.page-body th{border:1px solid var(--paper-edge);padding:4px 8px}
  .page-body pre,.page-body code{font-family:ui-monospace,monospace;font-size:.85em;white-space:pre-wrap}
  .page.image-page,.page.pdf-page{background:#fff}
  .page.image-page img,.page.pdf-page img{
    position:absolute;inset:0;width:100%;height:100%;object-fit:contain;
  }
  .page.cover{
    background:
      radial-gradient(120% 90% at 20% 0%, rgba(255,255,255,.10), transparent 50%),
      linear-gradient(150deg,#3a4d40,#243329 65%);
    color:var(--paper);
  }
  .page.cover .page-body{display:flex;flex-direction:column;justify-content:flex-end;padding:44px}
  .page.cover .kicker{font-size:.72rem;letter-spacing:.28em;text-transform:uppercase;color:var(--brass-bright);margin-bottom:14px}
  .page.cover h1{font-family:'Fraunces',serif;font-size:2.5rem;color:var(--paper);margin-bottom:10px}
  .page.cover p{color:var(--sage)}
  .page.cover .rule{width:56px;height:2px;background:var(--brass);margin-bottom:22px}

  /* click zones */
  .zone{position:absolute;z-index:400;cursor:pointer;background:transparent;border:0;padding:0}
  .zone:focus-visible{outline:2px dashed var(--brass-bright);outline-offset:-6px}
  #stage:not(.vertical) .zone.prev{left:0;top:0;width:18%;height:100%}
  #stage:not(.vertical) .zone.next{right:0;top:0;width:18%;height:100%}
  #stage.vertical .zone.prev{top:0;left:0;height:14%;width:100%}
  #stage.vertical .zone.next{bottom:0;left:0;height:14%;width:100%}

  /* ---------- footer controls ---------- */
  footer{
    display:flex;align-items:center;justify-content:center;gap:20px;
    padding:14px 20px 20px;z-index:5;
  }
  .nav-btn{
    width:44px;height:44px;border-radius:50%;border:1px solid rgba(227,188,109,.45);
    background:rgba(0,0,0,.25);color:var(--paper);cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:background .2s,transform .15s;
  }
  .nav-btn svg{width:18px;height:18px;transition:transform .3s ease}
  #stage-nav.vertical .nav-btn svg{transform:rotate(90deg)}
  .nav-btn:hover{background:rgba(192,149,67,.3)}
  .nav-btn:active{transform:scale(.92)}
  .nav-btn:disabled{opacity:.3;cursor:default}
  .nav-btn:focus-visible{outline:2px solid var(--brass-bright);outline-offset:2px}
  #indicator{
    font-family:'Fraunces',serif;font-size:.95rem;letter-spacing:.08em;
    color:var(--paper);min-width:130px;text-align:center;
  }
  #indicator span{color:var(--brass-bright)}
  .hint{position:fixed;bottom:74px;width:100%;text-align:center;font-size:.72rem;color:var(--sage);letter-spacing:.06em;pointer-events:none}

  /* ---------- drop overlay & loader ---------- */
  #drop-overlay{
    position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:900;
    background:rgba(20,29,24,.85);backdrop-filter:blur(3px);
  }
  #drop-overlay.show{display:flex}
  #drop-overlay .box{
    border:2px dashed var(--brass);border-radius:16px;padding:60px 80px;text-align:center;
    font-family:'Fraunces',serif;font-size:1.5rem;color:var(--brass-bright);
  }
  #loader{
    position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:950;
    background:rgba(20,29,24,.75);flex-direction:column;gap:16px;
  }
  #loader.show{display:flex}
  .spinner{
    width:46px;height:34px;border-radius:3px;background:var(--paper);
    transform-origin:left center;animation:flap .9s ease-in-out infinite alternate;
  }
  @keyframes flap{from{transform:rotateY(0)}to{transform:rotateY(-150deg)}}
  #loader p{font-size:.85rem;color:var(--sage);letter-spacing:.1em}
  #file-input{display:none}

  @media (prefers-reduced-motion:reduce){
    .sheet{transition:none}
    .spinner{animation:none}
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Page<em>turner</em></h1>
    <span class="doc-name" id="doc-name">Welcome booklet</span>
  </div>

  <div class="seg" role="group" aria-label="Flip direction">
    <button id="mode-h" class="active" aria-pressed="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 4v16M12 4c-3 2-7 2-9 1v14c2 1 6 1 9-1M12 4c3 2 7 2 9 1v14c-2 1-6 1-9-1"/></svg>
      Horizontal
    </button>
    <button id="mode-v" aria-pressed="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transform:rotate(90deg)"><path d="M12 4v16M12 4c-3 2-7 2-9 1v14c2 1 6 1 9-1M12 4c3 2 7 2 9 1v14c-2 1-6 1-9-1"/></svg>
      Vertical
    </button>
  </div>

  <button class="btn primary" id="open-btn">Open a file</button>
  <input type="file" id="file-input" accept=".pdf,.docx,.txt,.md,.html,.htm,image/*">
</header>

<main>
  <div id="scaler">
    <div id="stage" class="has-right">
      <div class="base left"></div>
      <div class="base right"></div>
      <div id="sheets"></div>
      <button class="zone prev" aria-label="Previous page"></button>
      <button class="zone next" aria-label="Next page"></button>
    </div>
  </div>
</main>

<p class="hint">Arrow keys flip pages · drop a file anywhere to open it</p>

<footer id="stage-nav">
  <button class="nav-btn" id="prev-btn" aria-label="Previous page">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M15 5l-7 7 7 7"/></svg>
  </button>
  <div id="indicator" aria-live="polite">— / —</div>
  <button class="nav-btn" id="next-btn" aria-label="Next page">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M9 5l7 7-7 7"/></svg>
  </button>
</footer>

<div id="drop-overlay"><div class="box">Drop it on the desk</div></div>
<div id="loader"><div class="spinner"></div><p id="loader-msg">PREPARING PAGES…</p></div>

<script>
(() => {
  // NOTE: pdf.js worker is configured lazily inside loadPDF().
  // Doing it here crashed the whole script (ReferenceError) whenever the
  // CDN script failed to load, which left every button — including
  // "Open a file" — without its event listener.

  const PAGE_W = 430, PAGE_H = 560;
  const stage      = document.getElementById('stage');
  const sheetsRoot = document.getElementById('sheets');
  const scaler     = document.getElementById('scaler');
  const indicator  = document.getElementById('indicator');
  const docName    = document.getElementById('doc-name');
  const loader     = document.getElementById('loader');
  const loaderMsg  = document.getElementById('loader-msg');

  const state = { pages: [], sheets: [], pos: 0, mode: 'h', busy: false };

  /* ================= book construction ================= */

  function blankPage() {
    const p = document.createElement('div');
    p.className = 'page';
    return p;
  }

  function buildBook(pages) {
    sheetsRoot.innerHTML = '';
    state.pages = pages;
    state.sheets = [];
    state.pos = 0;

    const nSheets = Math.ceil(pages.length / 2);
    for (let k = 0; k < nSheets; k++) {
      const sheet = document.createElement('div');
      sheet.className = 'sheet';
      const front = document.createElement('div');
      front.className = 'face front';
      front.appendChild(pages[2 * k]);
      const back = document.createElement('div');
      back.className = 'face back';
      back.appendChild(pages[2 * k + 1] || blankPage());
      sheet.append(front, back);
      sheetsRoot.appendChild(sheet);
      state.sheets.push(sheet);
    }
    numberPages();
    render(true);
  }

  function numberPages() {
    state.pages.forEach((p, i) => {
      if (p.classList.contains('cover')) return;
      let n = p.querySelector('.page-num');
      if (!n) { n = document.createElement('div'); n.className = 'page-num'; p.appendChild(n); }
      n.textContent = i + 1;
    });
  }

  function render(instant = false) {
    const n = state.sheets.length;
    state.sheets.forEach((sheet, k) => {
      if (instant) sheet.classList.add('no-anim');
      sheet.classList.toggle('flipped', k < state.pos);
      sheet.style.zIndex = (k < state.pos) ? (k + 1) : (n - k);
      if (instant) requestAnimationFrame(() => sheet.classList.remove('no-anim'));
    });
    stage.classList.toggle('has-left', state.pos > 0);
    stage.classList.toggle('has-right', state.pos < n);
    updateIndicator();
    document.getElementById('prev-btn').disabled = state.pos === 0;
    document.getElementById('next-btn').disabled = state.pos >= n;
  }

  function updateIndicator() {
    const total = state.pages.length;
    if (!total) { indicator.textContent = '— / —'; return; }
    const left = 2 * state.pos, right = 2 * state.pos + 1;
    let shown;
    if (state.pos === 0) shown = '1';
    else if (left >= total) shown = String(total);
    else shown = right <= total ? `${left}–${Math.min(right, total)}` : String(left);
    indicator.innerHTML = `<span>${shown}</span> / ${total}`;
  }

  function flip(dir) {
    if (state.busy || !state.sheets.length) return;
    const target = state.pos + dir;
    if (target < 0 || target > state.sheets.length) return;

    const sheet = dir > 0 ? state.sheets[state.pos] : state.sheets[state.pos - 1];
    state.busy = true;
    sheet.style.zIndex = 999;                    // ride above everything mid-flip
    state.pos = target;

    sheet.classList.toggle('flipped', dir > 0);
    stage.classList.toggle('has-left', state.pos > 0);
    stage.classList.toggle('has-right', state.pos < state.sheets.length);
    updateIndicator();
    document.getElementById('prev-btn').disabled = state.pos === 0;
    document.getElementById('next-btn').disabled = state.pos >= state.sheets.length;

    const done = () => { sheet.removeEventListener('transitionend', done); state.busy = false; render(); };
    sheet.addEventListener('transitionend', done);
    setTimeout(done, 850);                       // safety net
  }

  /* ================= mode toggle ================= */

  function setMode(mode) {
    state.mode = mode;
    // suppress transitions so sheets don't tumble while axes swap
    state.sheets.forEach(s => s.classList.add('no-anim'));
    stage.classList.toggle('vertical', mode === 'v');
    document.getElementById('stage-nav').classList.toggle('vertical', mode === 'v');
    document.getElementById('mode-h').classList.toggle('active', mode === 'h');
    document.getElementById('mode-v').classList.toggle('active', mode === 'v');
    document.getElementById('mode-h').setAttribute('aria-pressed', mode === 'h');
    document.getElementById('mode-v').setAttribute('aria-pressed', mode === 'v');
    requestAnimationFrame(() =>
      requestAnimationFrame(() => state.sheets.forEach(s => s.classList.remove('no-anim'))));
    fit();
  }

  /* ================= responsive scaling ================= */

  function fit() {
    const main = document.querySelector('main');
    const bw = state.mode === 'v' ? PAGE_W : PAGE_W * 2;
    const bh = state.mode === 'v' ? PAGE_H * 2 : PAGE_H;
    const s = Math.min((main.clientWidth - 48) / bw, (main.clientHeight - 40) / bh, 1.15);
    scaler.style.transform = `scale(${Math.max(s, .25)})`;
  }
  window.addEventListener('resize', fit);

  /* ================= file loading ================= */

  const CONTENT_W = PAGE_W - 80;      // page-body horizontal padding
  const CONTENT_H = PAGE_H - 84;      // top + bottom padding

  function htmlPage(inner) {
    const p = blankPage();
    const body = document.createElement('div');
    body.className = 'page-body';
    body.appendChild(inner);
    p.appendChild(body);
    return p;
  }

  // Flow arbitrary HTML into fixed-size pages by measuring real heights.
  function paginateHTML(html) {
    const meas = document.createElement('div');
    meas.style.cssText =
      `position:absolute;visibility:hidden;left:-9999px;top:0;width:${CONTENT_W}px;` +
      `font-family:'IBM Plex Sans',sans-serif;font-size:14.5px;line-height:1.62;`;
    meas.className = 'page-body';
    meas.style.position = 'absolute';
    meas.style.padding = '0';
    meas.style.height = 'auto';
    meas.style.inset = 'auto';
    document.body.appendChild(meas);

    const src = document.createElement('div');
    src.innerHTML = html;
    const blocks = [...src.children];
    if (!blocks.length && src.textContent.trim()) {
      const pre = document.createElement('p');
      pre.textContent = src.textContent;
      blocks.push(pre);
    }

    const pages = [];
    let cur = document.createElement('div');

    const fits = () => { meas.innerHTML = ''; meas.appendChild(cur.cloneNode(true)); return meas.scrollHeight <= CONTENT_H; };
    const push = () => { if (cur.childNodes.length) { pages.push(htmlPage(cur)); cur = document.createElement('div'); } };

    for (const block of blocks) {
      cur.appendChild(block.cloneNode(true));
      if (!fits()) {
        cur.removeChild(cur.lastChild);
        if (cur.childNodes.length) push();
        // element alone on a fresh page — split long text blocks by words
        cur.appendChild(block.cloneNode(true));
        if (!fits() && block.textContent.length > 200 && !block.querySelector('img,table')) {
          cur.removeChild(cur.lastChild);
          const words = block.textContent.split(/\s+/);
          let piece = block.cloneNode(false); piece.textContent = '';
          cur.appendChild(piece);
          for (const w of words) {
            piece.textContent += (piece.textContent ? ' ' : '') + w;
            if (!fits()) {
              piece.textContent = piece.textContent.slice(0, -(w.length + 1));
              push();
              piece = block.cloneNode(false); piece.textContent = w;
              cur.appendChild(piece);
            }
          }
        }
      }
    }
    push();
    meas.remove();
    return pages;
  }

  function imagePage(url, cls) {
    const p = blankPage();
    p.classList.add(cls);
    const img = document.createElement('img');
    img.src = url;
    img.alt = '';
    p.appendChild(img);
    return p;
  }

  const PDF_WORKER_URL = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  // Browsers refuse to run cross-origin worker scripts, and some environments
  // also block pdf.js's "fake worker" fallback. Fetching the worker code as
  // text and serving it from a same-origin blob: URL sidesteps both problems.
  async function ensurePdfWorker() {
    if (ensurePdfWorker.ready) return;
    try {
      const res = await fetch(PDF_WORKER_URL);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const code = await res.text();
      const blob = new Blob([code], { type: 'text/javascript' });
      pdfjsLib.GlobalWorkerOptions.workerSrc = URL.createObjectURL(blob);
    } catch (e) {
      // Last resort: let pdf.js try the CDN URL directly.
      pdfjsLib.GlobalWorkerOptions.workerSrc = PDF_WORKER_URL;
    }
    ensurePdfWorker.ready = true;
  }

  async function loadPDF(file) {
    if (typeof pdfjsLib === 'undefined') {
      throw new Error('The PDF library (pdf.js) failed to load from the CDN — check your internet connection and reload the page.');
    }
    await ensurePdfWorker();
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    const pages = [];
    for (let i = 1; i <= pdf.numPages; i++) {
      loaderMsg.textContent = `RENDERING PAGE ${i} OF ${pdf.numPages}…`;
      const page = await pdf.getPage(i);
      const vp = page.getViewport({ scale: 1 });
      const scale = Math.min((PAGE_W * 2) / vp.width, (PAGE_H * 2) / vp.height);
      const v = page.getViewport({ scale });
      const canvas = document.createElement('canvas');
      canvas.width = v.width; canvas.height = v.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport: v }).promise;
      pages.push(imagePage(canvas.toDataURL('image/jpeg', .92), 'pdf-page'));
    }
    return pages;
  }

  async function loadDOCX(file) {
    if (typeof mammoth === 'undefined') {
      throw new Error('The Word document library (mammoth.js) failed to load from the CDN — check your internet connection and reload the page.');
    }
    const buf = await file.arrayBuffer();
    const result = await mammoth.convertToHtml({ arrayBuffer: buf });
    return paginateHTML(result.value || '<p>(empty document)</p>');
  }

  function textToHTML(text) {
    return text.split(/\n{2,}/).map(par =>
      `<p style="white-space:pre-wrap">${par.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</p>`
    ).join('');
  }

  async function loadFile(file) {
    const ext = (file.name.split('.').pop() || '').toLowerCase();
    loader.classList.add('show');
    loaderMsg.textContent = 'PREPARING PAGES…';
    try {
      let pages;
      if (ext === 'pdf' || file.type === 'application/pdf') {
        pages = await loadPDF(file);
      } else if (ext === 'docx') {
        pages = await loadDOCX(file);
      } else if (file.type.startsWith('image/')) {
        pages = [imagePage(URL.createObjectURL(file), 'image-page')];
      } else if (['html', 'htm'].includes(ext)) {
        const doc = new DOMParser().parseFromString(await file.text(), 'text/html');
        pages = paginateHTML(doc.body.innerHTML);
      } else if (['txt', 'md'].includes(ext) || file.type.startsWith('text/')) {
        pages = paginateHTML(textToHTML(await file.text()));
      } else {
        alert('Unsupported file type. Try PDF, DOCX, TXT, MD, HTML, or an image.');
        return;
      }
      if (!pages.length) pages = [blankPage()];
      docName.textContent = file.name;
      buildBook(pages);
      fit();
    } catch (err) {
      console.error(err);
      alert('Could not open that file: ' + err.message);
    } finally {
      loader.classList.remove('show');
    }
  }

  /* ================= welcome booklet ================= */

  function demoBook() {
    const cover = blankPage();
    cover.classList.add('cover');
    cover.innerHTML = `
      <div class="page-body">
        <div class="kicker">A reading desk for your files</div>
        <div class="rule"></div>
        <h1>Pageturner</h1>
        <p>Open any document and leaf through it like a real book — sideways or upwards, your call.</p>
      </div>`;

    const inner = `
      <h2>What it reads</h2>
      <p><strong>PDF</strong> files are rendered page-for-page, exactly as printed.</p>
      <p><strong>Word documents</strong> (.docx) are converted and flowed into book pages automatically.</p>
      <p><strong>Plain text &amp; Markdown</strong> (.txt, .md) get typeset and paginated.</p>
      <p><strong>HTML</strong> files and <strong>images</strong> work too.</p>
      <h2>Two ways to flip</h2>
      <p>Use the toggle in the top bar:</p>
      <ul>
        <li><strong>Horizontal</strong> — a classic open book. Pages turn at the spine, left and right.</li>
        <li><strong>Vertical</strong> — calendar style. Pages lift up and over the top edge.</li>
      </ul>
      <h2>Getting around</h2>
      <ul>
        <li>Click the <strong>edges of the page</strong> to turn it.</li>
        <li>Use the <strong>round arrows</strong> below the book.</li>
        <li><strong>Arrow keys</strong> work in both directions: ← → and ↑ ↓.</li>
        <li><strong>Home</strong> and <strong>End</strong> jump to the first or last page.</li>
      </ul>
      <h2>Opening a file</h2>
      <p>Press <strong>Open a file</strong> in the top bar, or simply drag a document from your computer and drop it anywhere on the desk.</p>
      <p>Everything happens locally in your browser — nothing is uploaded anywhere.</p>
      <h2>A note on pagination</h2>
      <p>Word, text, and HTML content is reflowed to fit these pages, so page counts will differ from the original file. PDFs keep their exact layout.</p>
      <p>Enjoy the read.</p>`;

    buildBook([cover, ...paginateHTML(inner)]);
    fit();
  }

  /* ================= events ================= */

  document.getElementById('open-btn').addEventListener('click', () => document.getElementById('file-input').click());
  document.getElementById('file-input').addEventListener('change', e => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
    e.target.value = '';
  });

  document.getElementById('next-btn').addEventListener('click', () => flip(1));
  document.getElementById('prev-btn').addEventListener('click', () => flip(-1));
  stage.querySelector('.zone.next').addEventListener('click', () => flip(1));
  stage.querySelector('.zone.prev').addEventListener('click', () => flip(-1));

  document.getElementById('mode-h').addEventListener('click', () => setMode('h'));
  document.getElementById('mode-v').addEventListener('click', () => setMode('v'));

  document.addEventListener('keydown', e => {
    if (['ArrowRight', 'ArrowDown', 'PageDown', ' '].includes(e.key)) { e.preventDefault(); flip(1); }
    else if (['ArrowLeft', 'ArrowUp', 'PageUp'].includes(e.key)) { e.preventDefault(); flip(-1); }
    else if (e.key === 'Home') { state.pos = 0; render(true); }
    else if (e.key === 'End') { state.pos = state.sheets.length; render(true); }
  });

  // drag & drop
  const overlay = document.getElementById('drop-overlay');
  let dragDepth = 0;
  window.addEventListener('dragenter', e => { e.preventDefault(); if (++dragDepth === 1) overlay.classList.add('show'); });
  window.addEventListener('dragleave', e => { e.preventDefault(); if (--dragDepth <= 0) { dragDepth = 0; overlay.classList.remove('show'); } });
  window.addEventListener('dragover', e => e.preventDefault());
  window.addEventListener('drop', e => {
    e.preventDefault(); dragDepth = 0; overlay.classList.remove('show');
    if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
  });

  demoBook();
  fit();
})();
</script>
</body>
</html>
